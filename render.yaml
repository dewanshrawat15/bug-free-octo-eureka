databases:
  - name: career-coach-db
    databaseName: career
    user: career
    plan: free

services:
  - type: web
    name: career-coach-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --worker-class gthread --workers 2 --threads 4 --timeout 600
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: career-coach-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # set to your frontend URL after first deploy, e.g. https://career-coach-frontend.onrender.com
      - key: LLM_API_KEY
        sync: false  # set your Groq API key here
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: career-coach-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # set to your backend URL, e.g. https://career-coach-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
